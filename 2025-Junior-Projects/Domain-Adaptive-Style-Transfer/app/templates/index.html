<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain-Adaptive Style Transfer Dashboard</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f8f9fa; 
            color: #212529; 
            margin: 0; 
            padding: 40px 20px; 
        }
        .header { 
            text-align: center; 
            margin-bottom: 50px; 
            padding: 10px;
        }
        h1 { 
            font-size: 2.2rem; 
            font-weight: 700; 
            letter-spacing: -0.5px;
            margin: 0;
        }
        .container { 
            display: flex; 
            flex-direction: column; 
            gap: 40px; 
            align-items: center; 
            max-width: 1200px;
            margin: 0 auto;
        }
        .comparison-row { 
            display: flex; 
            gap: 24px; 
            background: #ffffff; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
        }
        .image-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .label { 
            font-size: 0.75rem; 
            font-weight: 600; 
            color: #6c757d; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        img { 
            width: 500px; 
            height: auto;
            border-radius: 6px; 
            display: block;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Domain-Adaptive Style Transfer</h1>
    </div>

    <div class="container">
        {% for img in images %}
        <div class="comparison-row">
            <div class="image-group">
                <div class="label">Original Synthetic (GTA5)</div>
                <img src="/static/original/{{ img }}" alt="Synthetic Input">
            </div>
            <div class="image-group">
                <div class="label">Real-World Style (Model 1)</div>
                <img src="/static/results/{{ img }}" alt="Style Transferred Output">
            </div>
        </div>
        {% endfor %}
    </div>

</body>
</html>
